context.modules = [
    # =================================================================
    # DAX TX: Virtual Transmit Bridge (Chromium + Firefox Compatible)
    # =================================================================
    # WSJT-X sends playback audio to the Sink ("DAX TX").
    # Chromium/Firefox record input modulation from the Source ("DAX TX Mic").
    { name = libpipewire-module-loopback
      args = {
          audio.position = [ FL FR ]
          capture.props = {
              media.class = "Audio/Sink"
              node.name = "dax_tx"
              node.description = "DAX TX"
          }
          playback.props = {
              media.class = "Audio/Source"
              node.name = "dax_tx_source"
              node.description = "DAX TX"
          }
      }
    }

    # =================================================================
    # DAX RX 1: Virtual Receiver Channel 1
    # =================================================================
    # Browser SDR outputs VFO audio to the Sink ("DAX RX 1").
    # WSJT-X captures from the Source ("DAX RX 1 Mic").
    { name = libpipewire-module-loopback
      args = {
          audio.position = [ FL FR ]
          capture.props = {
              media.class = "Audio/Sink"
              node.name = "dax_rx1"
              node.description = "DAX RX 1"
          }
          playback.props = {
              media.class = "Audio/Source"
              node.name = "dax_rx1_source"
              node.description = "DAX RX 1"
          }
      }
    }

