version: 2

project_name: solid-sdr-server

before:
  hooks:
    - rm -rf apps/server/internal/static/web
    - pnpm --filter web build
    - sh -c "mkdir -p apps/server/internal/static/web && cp -r apps/web/dist apps/server/internal/static/web/dist"

builds:
  - id: solid-sdr-server
    main: ./cmd/bridge
    dir: apps/server
    binary: solid-sdr-server
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=release
    ldflags:
      - -s -w -X github.com/daveisadork/solid-sdr/apps/server/internal/version.Version={{.Tag}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: "386"
      - goos: linux
        goarch: "386"
      - goos: windows
        goarch: arm

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: darwin
        formats:
          - zip
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{- if eq .Os "darwin" -}}
      macos_{{- if eq .Arch "arm64" -}}apple-silicon{{- else if eq .Arch "amd64" -}}intel{{- else -}}{{ .Arch }}{{- end -}}
      {{- else if eq .Os "windows" -}}
      windows_{{- if eq .Arch "386" -}}32-bit{{- else if eq .Arch "amd64" -}}64-bit{{- else if eq .Arch "arm64" -}}arm{{- else -}}{{ .Arch }}{{- end -}}
      {{- else if eq .Os "linux" -}}
      linux_{{- if eq .Arch "amd64" -}}amd64{{- else if eq .Arch "arm64" -}}arm64{{- else if and (eq .Arch "arm") (eq .Arm "7") -}}armv7{{- else -}}{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}{{- end -}}
      {{- else -}}
      {{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
      {{- end }}
    files:
      - solid-sdr-server.example.yaml

release:
  draft: true

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Docker support — future addition
# dockers: []
