version: "2"
linters:
  # Default set of linters.
  # The value can be:
  # - `standard`: the "Default" linters https://golangci-lint.run/docs/linters/#all-linters
  # - `all`: enables all linters by default.
  # - `none`: disables all linters by default.
  # - `fast`: enables only linters considered as "fast" (`golangci-lint help linters --json | jq '[ .[] | select(.fast==true) ] | map(.name)'`).
  # Default: standard
  default: all
  # Enable specific linter.
  # enable:
  #   - arangolint
  # Disable specific linters.
  disable:
    # Deprecated since v2.12.0 and replaced by gomodguard_v2 (which default:all
    # already enables); disabling the old one silences the deprecation warning.
    # Both are inert for us anyway — we configure no module blocklist.
    - gomodguard
    - depguard
    - exhaustruct
    - mnd
    - nonamedreturns
    - varnamelen
    - wsl
    # Our unit tests deliberately live in-package to exercise unexported
    # symbols (nextTXPacket, parseAudioStream, etc.); an external _test
    # package would force exporting internals purely to satisfy the linter.
    - testpackage
    # gocognit (kept) is our complexity signal — it weights nesting, which is
    # what actually hurts readability. cyclop double-counts every boolean guard
    # (`a || b` scores 2), and funlen just counts lines/statements; both flag
    # inherently branchy parsers and linear setup code without indicating a
    # real problem.
    - cyclop
    - funlen
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
