version: 2
updates:
  # pnpm workspace (root, apps/*, packages/*)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Go module for the server
  - package-ecosystem: "gomod"
    directory: "/apps/server"
    schedule:
      interval: "weekly"

  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
