version: 2

project_name: solid-sdr-server

before:
  hooks:
    - rm -rf apps/server/internal/static/web
    - pnpm --filter web build
    - sh -c "mkdir -p apps/server/internal/static/web && cp -r apps/web/dist apps/server/internal/static/web/dist"

builds:
  - id: solid-sdr-server
    main: ./cmd/bridge
    dir: apps/server
    binary: solid-sdr-server
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=release
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
      - "386"
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm
      - goos: darwin
        goarch: "386"
      - goos: linux
        goarch: "386"
      - goos: windows
        goarch: arm

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - solid-sdr-server.example.yaml

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Docker support — future addition
# dockers: []
